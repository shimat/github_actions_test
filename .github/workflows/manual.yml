name: Manual

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'デプロイ先の環境 (dev/stg/prod)'
        required: true

jobs:
  build:
    name: Deploy to ${{ github.event.inputs.deploy_env }}
    runs-on: ubuntu-latest

    steps:
      - name: 'Notify'
        run: |
          PAYLOAD='
            {"name":"Result", "head_sha":"'${GITHUB_SHA}'", "status":"completed", "conclusion":"success", 
              "output":{ 
                "title":"My Message", "summary":"デプロイが完了しました (環境: ${{github.event.inputs.deploy_env}})"
              } 
            }'
          echo "${PAYLOAD}"
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/vnd.github.v3+json" \
            -d "${PAYLOAD}" \
            https://api.github.com/repos/${{ github.repository }}/check-runs
