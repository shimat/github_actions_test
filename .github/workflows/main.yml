name: CI

# Controls when the action will run. 
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
        
      - name: Get date
        id: date_begin
        run: |
          echo "::set-output name=branch_name::$(date '+%Y-%m-%dT%H:%M:%SZ')"
      
      - name: Notify Check 1
        uses: LouisBrunner/checks-action@v1.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: MyCheck
          status: in_progress
          action_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          output: |
            {"summary":"Test Output (in progress)"}

      - name: Sleep
        run: |
          sleep 30
          
      - name: Notify Check 2
        uses: LouisBrunner/checks-action@v1.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: MyCheck
          status: completed
          conclusion: success
          action_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          details_url: 'https://github.com/shimat'
          annotations: |
            {"path":"foo.txt", "start_line":1, "end_line":2, "annotation_level":"notice", "message":"message", "title":"title"}
          output: |
            {"summary":"Test Output (completed)"}
