name: Manual

on:
  workflow_dispatch:
    inputs:      
      foo:
        description: 'Foo'
        required: false
        default: ""

jobs:
  A:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "A"  

  B:
    runs-on: ubuntu-latest
    # if: ${{ false }}  
    steps:
      - if: ${{ false }}  
        run: |
          echo "B"

  C:
    runs-on: ubuntu-latest
    needs: [A, B]
    # if: always() && needs.A.result != 'failure' && needs.B.result != 'failure'
    # if: ${{ ! failure() }} 
    steps:
      - run: |
          echo "${{ needs.A.result }}"  # success
          echo "${{ needs.B.result }}"  # skipped
          echo "C"

  D:
    runs-on: ubuntu-latest
    needs: [C]
    # if: ${{ ! failure() }} 
    steps:
      - run: |
          echo "${{ needs.C.result }}"
          echo "D"
